<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeDrive AI Pro</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --warning: #f59e0b; --success: #10b981; --text: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: #000; color: var(--text); margin: 0; display: flex; justify-content: center; overflow: hidden; }
        .app-shell { width: 100%; max-width: 410px; height: 100vh; background: var(--bg); position: relative; display: flex; flex-direction: column; }
        
        #p-login { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .btn-google { background: white; color: #000; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; display: flex; align-items: center; gap: 10px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        .emergency { display: none; position: absolute; inset: 0; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; text-align: center; backdrop-filter: blur(15px); color: white; }
        .blink { animation: blinker 0.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.6; } }
        
        .header { padding: 30px 20px 10px; }
        .user-chip { display: flex; align-items: center; gap: 12px; background: var(--card); padding: 8px 15px; border-radius: 50px; border: 1px solid #334155; }
        .avatar { width: 32px; height: 32px; background: var(--primary); border-radius: 50%; color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .page { display: none; padding: 20px; flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .page.active { display: block; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; }
        
        .nav { position: absolute; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; }
        .nav-btn { cursor: pointer; color: #64748b; font-size: 0.75rem; text-align: center; }
        .nav-btn.active { color: var(--primary); }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
    </style>
</head>
<body>

<div id="p-login">
    <h1 style="font-size: 4rem; margin: 0;">🚗</h1>
    <h2 style="margin-bottom: 5px;">SafeDrive AI</h2>
    <p style="color: #94a3b8; margin-bottom: 30px;">Tu copiloto inteligente</p>
    <button class="btn-google" onclick="login()">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20">
        Entrar con Google
    </button>
</div>

<div class="app-shell">
    <div id="alert-sueno" class="emergency blink" style="background: rgba(239, 68, 68, 0.95);">
        <h1 style="font-size: 5rem;">😴</h1>
        <h2>¡MICROSUEÑO!</h2>
        <button onclick="stopAll()" style="background: white; color: var(--danger); width: 60%;">ESTOY DESPIERTO</button>
    </div>

    <div id="alert-celular" class="emergency" style="background: rgba(245, 158, 11, 0.95);">
        <h1 style="font-size: 5rem;">📱</h1>
        <h2>¡DEJE EL CELULAR!</h2>
        <button onclick="stopAll()" style="background: white; color: var(--warning); width: 60%;">ENTENDIDO</button>
    </div>

    <div class="header">
        <div class="user-chip">
            <div id="user-photo" class="avatar">?</div>
            <div>
                <p id="user-name" style="margin: 0; font-size: 0.85rem; font-weight: bold;">Cargando...</p>
                <small id="status-txt" style="color: var(--danger);">● Offline</small>
            </div>
        </div>
    </div>

    <div id="p-home" class="page active">
        <div class="card" style="text-align: center;">
            <canvas id="dayChart" style="max-height: 160px;"></canvas>
        </div>
        <div class="card" id="fatigue-card" style="border-left: 8px solid var(--success);">
            <h4 style="margin: 0;">Estado de Conducción</h4>
            <p id="fatigue-msg" style="margin: 5px 0 0; font-size: 0.9rem; color: var(--success);">Conducción segura.</p>
        </div>
    </div>

    <div id="p-stats" class="page">
        <h3>Reporte Semanal</h3>
        <div class="card"><canvas id="weekChart"></canvas></div>
        <div class="card">
            <p>Alertas de Sueño: <b id="tot-sueno">0</b></p>
            <p>Alertas de Celular: <b id="tot-cel">0</b></p>
        </div>
    </div>

    <div id="p-test" class="page">
        <h3>Panel de Pruebas</h3>
        <button onclick="setupAudio()" style="background: var(--success); color: white; margin-bottom: 10px;">1. Activar Altavoz</button>
        <button onclick="enviarTest('SUEÑO')" style="background: var(--primary); color: black; margin-bottom: 10px;">Test Microsueño</button>
        <button onclick="enviarTest('CELULAR')" style="background: var(--warning); color: black;">Test Celular</button>
        <button onclick="firebase.auth().signOut()" style="margin-top: 20px; background: transparent; color: var(--danger);">Cerrar Sesión</button>
    </div>

    <nav class="nav">
        <div class="nav-btn active" onclick="nav('p-home', this)">📊<br>Monitor</div>
        <div class="nav-btn" onclick="nav('p-stats', this)">📈<br>Stats</div>
        <div class="nav-btn" onclick="nav('p-test', this)">⚙️<br>Config</div>
    </nav>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD4bepO4wdEpxJPZ6CgWI5r1Rnok8tpYlA",
        authDomain: "safedriveauth.firebaseapp.com",
        projectId: "safedriveauth",
        storageBucket: "safedriveauth.firebasestorage.app",
        messagingSenderId: "157033724386",
        appId: "1:157033724386:web:b3b465fe2f8ee0cd3aa1bb"
    };
    firebase.initializeApp(firebaseConfig);

    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider);
    }

    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            document.getElementById('p-login').style.display = 'none';
            document.getElementById('user-name').innerText = user.displayName;
            document.getElementById('user-photo').innerHTML = `<img src="${user.photoURL}">`;
        } else {
            document.getElementById('p-login').style.display = 'flex';
        }
    });

    let audio = null, osc = null;
    const client = mqtt.connect('wss://3f6846583aaa42d1bcf10c88481b63fd.s1.eu.hivemq.cloud:8884/mqtt', { username: 'ELPEPE', password: 'LOCO123j' });
    
    // Base de datos local actualizada para incluir celular
    let db = JSON.parse(localStorage.getItem('safedrive_db_v2')) || { 
        semana: [0,0,0,0,0,0,0], 
        suenos: 0, 
        celular: 0 
    };

    function setupAudio() { audio = new (window.AudioContext || window.webkitAudioContext)(); alert("Sonido Activado"); }
    
    client.on('connect', () => { 
        document.getElementById('status-txt').innerText = "● Sistema Online";
        document.getElementById('status-txt').style.color = "var(--success)";
        client.subscribe("conductor/ia");
        refresh();
    });

    client.on('message', (t, m) => { 
        const msg = m.toString();
        if(msg === 'SUEÑO') alerta('sueno');
        if(msg === 'CELULAR') alerta('celular');
    });

    function alerta(tipo) {
        const hoy = (new Date().getDay() + 6) % 7;
        
        if (tipo === 'sueno') {
            document.getElementById('alert-sueno').style.display = 'flex';
            if (audio) { playTone(800, 'square'); }
            db.suenos++;
        } else {
            document.getElementById('alert-celular').style.display = 'flex';
            if (audio) { playTone(400, 'sawtooth'); }
            db.celular++;
        }
        
        db.semana[hoy]++;
        localStorage.setItem('safedrive_db_v2', JSON.stringify(db));
        refresh();
    }

    function playTone(freq, type) {
        if (osc) stopAll();
        osc = audio.createOscillator();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audio.currentTime);
        osc.connect(audio.destination);
        osc.start();
    }

    function stopAll() {
        document.getElementById('alert-sueno').style.display = 'none';
        document.getElementById('alert-celular').style.display = 'none';
        if (osc) { osc.stop(); osc.disconnect(); osc = null; }
    }

    function refresh() {
        document.getElementById('tot-sueno').innerText = db.suenos;
        document.getElementById('tot-cel').innerText = db.celular;
        
        const card = document.getElementById('fatigue-card');
        const msg = document.getElementById('fatigue-msg');

        if (db.suenos >= 3) {
            card.style.borderLeft = "8px solid var(--danger)";
            msg.innerText = "¡PELIGRO! Demasiados microsueños detectados.";
            msg.style.color = "var(--danger)";
        } else if (db.celular > 0) {
            card.style.borderLeft = "8px solid var(--warning)";
            msg.innerText = "Atención: Distracciones con el celular.";
            msg.style.color = "var(--warning)";
        } else {
            card.style.borderLeft = "8px solid var(--success)";
            msg.innerText = "Conducción segura.";
            msg.style.color = "var(--success)";
        }
        renderCharts();
    }

    function enviarTest(m) { client.publish("conductor/ia", m); }
    
    function nav(id, el) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    let c1, c2;
    function renderCharts() {
        const ctxD = document.getElementById('dayChart').getContext('2d');
        if(c1) c1.destroy();
        c1 = new Chart(ctxD, { 
            type: 'doughnut', 
            data: { 
                labels: ['SUEÑO', 'CELULAR', 'OK'], 
                datasets: [{ data: [db.suenos, db.celular, 10], backgroundColor: ['#ef4444', '#f59e0b', '#1e293b'], borderWidth: 0 }] 
            }, 
            options: { cutout: '80%', plugins: { legend: { display: false } } } 
        });
        
        const ctxW = document.getElementById('weekChart').getContext('2d');
        if(c2) c2.destroy();
        c2 = new Chart(ctxW, { 
            type: 'bar', 
            data: { 
                labels: ['L','M','X','J','V','S','D'], 
                datasets: [{ label: 'Alertas Totales', data: db.semana, backgroundColor: '#38bdf8' }] 
            } 
        });
    }
</script>
</body>
</html>
