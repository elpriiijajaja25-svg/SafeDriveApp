<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Metadatos de Instalación (PWA) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Neon Racer">
    <meta name="theme-color" content="#00f7ff">
    
    <title>Neon Racer: Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 450px;
            background: #050505;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 247, 255, 0.1);
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .hidden { display: none !important; }

        .btn-neon {
            background: linear-gradient(180deg, rgba(0, 247, 255, 0.1) 0%, rgba(0, 0, 0, 0.5) 100%);
            border: 2px solid #00f7ff;
            color: #00f7ff;
            padding: 16px 24px;
            margin: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            border-radius: 4px;
            width: 80%;
            font-size: 0.9rem;
            text-shadow: 0 0 5px #00f7ff;
        }

        .btn-neon:active {
            background: #00f7ff;
            color: #000;
            box-shadow: 0 0 30px #00f7ff;
            transform: translateY(2px);
        }

        #hud {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .hud-item { display: flex; flex-direction: column; }
        .hud-label { font-size: 0.6rem; color: #00f7ff; opacity: 0.7; letter-spacing: 2px; }
        .hud-value { font-size: 1.4rem; font-weight: bold; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        .gemini-box {
            background: rgba(0, 247, 255, 0.03);
            border-left: 3px solid #00f7ff;
            padding: 15px;
            margin: 20px 0;
            font-size: 0.8rem;
            color: #aaf;
            line-height: 1.5;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Pantalla de Inicio -->
        <div id="ui-menu" class="overlay">
            <h1 class="text-4xl font-bold mb-1 italic text-cyan-400" style="text-shadow: 0 0 25px #00f7ff;">NEON RACER</h1>
            <p class="text-[0.6rem] tracking-[0.6em] mb-12 opacity-50 uppercase">Nitro Fusion v7.0</p>
            
            <div id="daily-msg" class="gemini-box">
                Sincronizando sistemas con Gemini...
            </div>

            <button class="btn-neon" onclick="startGame()">Iniciar Enlace</button>
            <button class="btn-neon" onclick="toggleShop(true)">Garaje</button>
        </div>

        <!-- Garaje -->
        <div id="ui-shop" class="overlay hidden">
            <h2 class="text-2xl font-bold mb-6 text-white">GARAJE</h2>
            <div class="mb-4 text-yellow-400 font-bold">CREDITOS: <span id="shop-credits">0</span></div>
            <div id="car-selector" class="grid grid-cols-2 gap-4 w-full"></div>
            <button class="btn-neon mt-8" onclick="toggleShop(false)">Volver</button>
        </div>

        <!-- Game Over -->
        <div id="ui-over" class="overlay hidden">
            <h2 class="text-3xl font-bold text-red-500 mb-2">COLISIÓN DETECTADA</h2>
            <div class="text-2xl mb-8" id="final-dist">0 KM</div>
            
            <div id="ai-feedback" class="w-full mb-6">
                <button id="btn-ai" class="btn-neon !text-[0.7rem]" onclick="askGemini()">Consultar Ingeniero ✨</button>
                <div id="ai-text" class="gemini-box hidden"></div>
            </div>

            <button class="btn-neon" onclick="startGame()">Reiniciar</button>
            <button class="btn-neon" onclick="toggleShop(true)">Tienda</button>
        </div>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-item">
                <span class="hud-label">DISTANCIA</span>
                <span class="hud-value" id="hud-dist">0</span>
            </div>
            <div class="hud-item text-right">
                <span class="hud-label">CRÉDITOS</span>
                <span class="hud-value text-yellow-400" id="hud-credits">0</span>
            </div>
        </div>

        <canvas id="canvas"></canvas>
    </div>

    <script>
        // --- AUTO-GENERACIÓN DE MANIFEST PARA INSTALACIÓN ---
        const manifest = {
            "name": "Neon Racer",
            "short_name": "NeonRacer",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#000000",
            "theme_color": "#00f7ff",
            "orientation": "portrait"
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = manifestURL;
        document.head.appendChild(manifestLink);

        const apiKey = ""; 
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let w, h;
        function resize() {
            w = canvas.width = window.innerWidth > 450 ? 450 : window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- CONFIGURACIÓN ---
        let gameState = 'MENU';
        let score = 0;
        let credits = 0;
        let sessionCoins = 0;
        let currentCarIdx = 0;
        let gameSpeed = 8;
        let diffFactor = 1;

        const CARS = [
            { name: "RECRUIT", color: "#00f7ff", sec: "#003344", price: 0, owned: true },
            { name: "PULSE", color: "#ff00ff", sec: "#440044", price: 200, owned: false },
            { name: "GHOST", color: "#ffffff", sec: "#222222", price: 500, owned: false },
            { name: "NITRO", color: "#33ff00", sec: "#003300", price: 1000, owned: false }
        ];

        let player = { x: 0, targetX: 0, w: 42, h: 78, tilt: 0 };
        let obstacles = [];
        let coins = [];
        let roadOffset = 0;

        // --- GEMINI API ---
        async function callGemini(prompt, sys) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: sys }] }
                    })
                });
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) { return "Error de enlace con la red."; }
        }

        async function initAI() {
            const msg = await callGemini("Genera un mensaje de bienvenida corto y futurista para un piloto.", "Eres una IA de un auto deportivo del futuro.");
            document.getElementById('daily-msg').innerText = msg;
        }

        async function askGemini() {
            const btn = document.getElementById('btn-ai');
            const box = document.getElementById('ai-text');
            btn.classList.add('hidden');
            box.classList.remove('hidden');
            box.innerText = "Analizando impacto...";
            
            const advice = await callGemini(
                `El piloto chocó a los ${Math.floor(score/10)}km. Dame un consejo de conducción breve y con personalidad cyberpunk.`,
                "Eres un ingeniero de carreras cínico."
            );
            box.innerText = advice;
        }

        // --- INPUTS ---
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        window.addEventListener('touchstart', e => {
            if (gameState !== 'PLAYING') return;
            const touchX = e.touches[0].clientX;
            const step = w / 4;
            if (touchX < w / 2) player.targetX = Math.max(40, player.targetX - step);
            else player.targetX = Math.min(w - 80, player.targetX + step);
        });

        // --- DIBUJO DE VEHÍCULOS ---
        function drawCar(x, y, width, height, data, isEnemy = false, tilt = 0) {
            ctx.save();
            ctx.translate(x + width / 2, y + height / 2);
            ctx.rotate(tilt);

            ctx.shadowBlur = isEnemy ? 10 : 20;
            ctx.shadowColor = data.color;

            ctx.fillStyle = data.sec;
            ctx.beginPath();
            ctx.roundRect(-width / 2, -height / 2, width, height, 8);
            ctx.fill();

            ctx.fillStyle = data.color;
            ctx.beginPath();
            ctx.roundRect(-width / 2 + 4, -height / 2 + 12, width - 8, height - 24, 4);
            ctx.fill();

            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            ctx.beginPath();
            ctx.roundRect(-width / 2 + 8, -height / 2 + 20, width - 16, 22, 5);
            ctx.fill();

            if (isEnemy) {
                ctx.fillStyle = "#ff0000";
                ctx.fillRect(-width / 2 + 5, -height / 2 + 4, 8, 4);
                ctx.fillRect(width / 2 - 13, -height / 2 + 4, 8, 4);
                ctx.fillStyle = data.sec;
                ctx.fillRect(-width/2 + 2, -height/2 + 2, width - 4, 4);
            } else {
                ctx.fillStyle = "#fff";
                ctx.shadowBlur = 15;
                ctx.fillRect(-width / 2 + 5, -height / 2 + 4, 10, 5);
                ctx.fillRect(width / 2 - 15, -height / 2 + 4, 10, 5);
                
                ctx.fillStyle = data.color;
                if (Math.random() > 0.3) {
                    ctx.fillRect(-width / 2 + 8, height / 2 - 2, 6, 6);
                    ctx.fillRect(width / 2 - 14, height / 2 - 2, 6, 6);
                }
            }

            ctx.restore();
            ctx.shadowBlur = 0;
        }

        // --- CORE ---
        function spawn() {
            if (Math.random() < 0.02 * diffFactor) {
                const lanes = [w*0.125, w*0.375, w*0.625, w*0.875];
                const laneX = lanes[Math.floor(Math.random() * 4)];
                const colors = [
                    { color: "#ff2255", sec: "#330011" },
                    { color: "#ffaa00", sec: "#332200" },
                    { color: "#aa00ff", sec: "#220033" }
                ];
                const style = colors[Math.floor(Math.random() * colors.length)];
                obstacles.push({ x: laneX - 20, y: -100, ...style });
            }
            if (Math.random() < 0.015) {
                const lanes = [w*0.125, w*0.375, w*0.625, w*0.875];
                coins.push({ x: lanes[Math.floor(Math.random() * 4)] - 15, y: -50 });
            }
        }

        function gameLoop() {
            if (gameState !== 'PLAYING') return;

            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, w, h);

            roadOffset = (roadOffset + gameSpeed) % 120;
            ctx.strokeStyle = "rgba(0, 247, 255, 0.08)";
            ctx.setLineDash([40, 80]);
            ctx.lineDashOffset = -roadOffset;
            ctx.lineWidth = 2;
            for(let i=1; i<4; i++) {
                ctx.beginPath(); ctx.moveTo((w/4)*i, 0); ctx.lineTo((w/4)*i, h); ctx.stroke();
            }

            if (keys['ArrowLeft'] && player.targetX > 30) player.targetX -= 12;
            if (keys['ArrowRight'] && player.targetX < w - 80) player.targetX += 12;

            player.x += (player.targetX - player.x) * 0.15;
            player.tilt = (player.targetX - player.x) * 0.04;

            score++;
            diffFactor = 1 + (score / 5000);
            gameSpeed = 8 * diffFactor;
            document.getElementById('hud-dist').innerText = Math.floor(score/10);
            document.getElementById('hud-credits').innerText = sessionCoins;

            spawn();

            obstacles.forEach((o, i) => {
                o.y += gameSpeed * 0.8;
                drawCar(o.x, o.y, 40, 75, o, true);
                if (Math.abs(player.x - o.x) < 36 && Math.abs(player.y - o.y) < 70) gameOver();
                if (o.y > h) obstacles.splice(i, 1);
            });

            coins.forEach((c, i) => {
                c.y += gameSpeed;
                ctx.fillStyle = "#ffd700";
                ctx.shadowBlur = 15; ctx.shadowColor = "#ffd700";
                ctx.beginPath(); ctx.arc(c.x+15, c.y+15, 12, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                if (Math.abs(player.x - c.x) < 35 && Math.abs(player.y - c.y) < 60) {
                    sessionCoins += 20; coins.splice(i, 1);
                }
                if (c.y > h) coins.splice(i, 1);
            });

            drawCar(player.x, player.y, player.w, player.h, CARS[currentCarIdx], false, player.tilt);

            requestAnimationFrame(gameLoop);
        }

        // --- UI ---
        function startGame() {
            gameState = 'PLAYING';
            score = 0; sessionCoins = 0; obstacles = []; coins = [];
            player.targetX = w/2 - 21; player.x = player.targetX;
            player.y = h - 160;
            document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
            document.getElementById('hud').classList.remove('hidden');
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameState = 'OVER';
            credits += sessionCoins;
            document.getElementById('final-dist').innerText = `${Math.floor(score/10)} KM`;
            document.getElementById('btn-ai').classList.remove('hidden');
            document.getElementById('ai-text').classList.add('hidden');
            document.getElementById('ui-over').classList.remove('hidden');
        }

        function toggleShop(show) {
            document.getElementById('ui-menu').classList.add('hidden');
            document.getElementById('ui-over').classList.add('hidden');
            document.getElementById('ui-shop').classList.toggle('hidden', !show);
            if (show) renderShop();
            else if (gameState === 'MENU') document.getElementById('ui-menu').classList.remove('hidden');
            else document.getElementById('ui-over').classList.remove('hidden');
        }

        function renderShop() {
            const container = document.getElementById('car-selector');
            document.getElementById('shop-credits').innerText = credits;
            container.innerHTML = '';
            CARS.forEach((car, i) => {
                const card = document.createElement('div');
                card.className = `p-3 rounded-lg border-2 ${currentCarIdx === i ? 'border-cyan-400 bg-cyan-900/20' : 'border-gray-800 bg-black/40'}`;
                card.innerHTML = `
                    <div class="text-[0.6rem] opacity-60 mb-2">${car.name}</div>
                    <div style="height:35px; background:${car.color}; border-radius:4px; margin-bottom:10px;"></div>
                    <button onclick="${car.owned ? `selectCar(${i})` : `buyCar(${i})`}" class="w-full text-[0.7rem] font-bold ${car.owned || credits >= car.price ? 'text-cyan-400' : 'text-gray-600'}">
                        ${car.owned ? (currentCarIdx === i ? 'EQUIPADO' : 'USAR') : `$${car.price}`}
                    </button>
                `;
                container.appendChild(card);
            });
        }

        function buyCar(i) {
            if (credits >= CARS[i].price) {
                credits -= CARS[i].price; CARS[i].owned = true; currentCarIdx = i; renderShop();
            }
        }
        function selectCar(i) { currentCarIdx = i; renderShop(); }

        initAI();
    </script>
</body>
</html>
